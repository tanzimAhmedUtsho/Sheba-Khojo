<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Successful - Sheba Khojo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body
    class="bg-pink-50 dark:bg-slate-900 min-h-screen flex items-center justify-center p-6 transition-colors duration-300"
  >
    <div
      class="max-w-md w-full bg-white dark:bg-slate-800 rounded-3xl shadow-2xl p-8 text-center border border-pink-100 dark:border-slate-700"
    >
      <div
        class="w-20 h-20 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-6"
      >
        <i class="fas fa-check text-4xl text-green-500"></i>
      </div>
      <h1 class="text-3xl font-bold text-slate-800 dark:text-white mb-4">
        বুকিং সফল হয়েছে!
      </h1>
      <p class="text-gray-600 dark:text-gray-400 mb-8 text-lg">
        ধন্যবাদ! আপনার
        <span id="booked-service" class="font-bold text-pink-500"></span>
        বুকিংটি আমরা পেয়েছি। আমাদের একজন প্রতিনিধি খুব শীঘ্রই আপনার সাথে যোগাযোগ
        করবেন।
      </p>
      <a
        href="/home/home.html"
        class="inline-block bg-pink-500 hover:bg-pink-600 text-white font-bold py-4 px-10 rounded-2xl transition transform active:scale-95 shadow-lg shadow-pink-200 dark:shadow-none"
      >
        হোম পেজে ফিরে যান
      </a>
    </div>

    <script>
      // থিম লোড করা
      if (localStorage.getItem("theme") === "dark") {
        document.documentElement.classList.add("dark");
      }

      // URL থেকে সার্ভিসের নাম বের করা
      window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const service = params.get("service");
        if (service) {
          document.getElementById("booked-service").innerText = service;
        } else {
          document.getElementById("booked-service").innerText = "সার্ভিস";
        }
      };
    </script>
  </body>
</html>
