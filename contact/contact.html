<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact & Feedback - Sheba Khojo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body class="bg-pink-50 dark:bg-slate-900 transition-colors duration-300">
    <!-- Navbar -->
    <nav
      class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-md sticky top-0 z-50 p-4 shadow-sm"
    >
      <div class="max-w-6xl mx-auto flex justify-between items-center px-4">
        <a href="../home/home.html" class="text-pink-600 font-bold text-lg"
          >← ফিরে যান</a
        >
        <h1 class="text-xl font-bold text-pink-500 hidden sm:block">
          যোগাযোগ ও মতামত
        </h1>
        <button
          onclick="toggleDark()"
          id="theme-toggle"
          class="p-2 bg-pink-100 dark:bg-slate-700 rounded-lg"
        >
          🌙
        </button>
      </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 py-12">
      <div class="text-center mb-12">
        <h2 class="text-4xl font-black text-slate-800 dark:text-white mb-4">
          আমাদের সাথে যোগাযোগ করুন
        </h2>
        <p class="text-gray-600 dark:text-gray-400">
          আপনার যেকোনো জিজ্ঞাসা, অভিযোগ বা মতামত আমাদের জানান।
        </p>
      </div>

      <div class="grid lg:grid-cols-3 gap-8">
        <!-- Contact Info Cards -->
        <div class="space-y-6">
          <div
            class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-pink-100 dark:border-slate-700"
          >
            <div class="flex items-center gap-4">
              <div
                class="w-12 h-12 bg-pink-100 dark:bg-pink-900/30 rounded-2xl flex items-center justify-center"
              >
                <i class="fas fa-phone text-pink-500"></i>
              </div>
              <div>
                <h3 class="font-bold dark:text-white">ফোন করুন</h3>
                <p class="text-gray-500 text-sm">+৮৮০ ১৭৫৬ ৪৬৭৬৭০</p>
              </div>
            </div>
          </div>

          <div
            class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-pink-100 dark:border-slate-700"
          >
            <div class="flex items-center gap-4">
              <div
                class="w-12 h-12 bg-green-100 dark:bg-green-900/30 rounded-2xl flex items-center justify-center"
              >
                <i class="fab fa-whatsapp text-green-500"></i>
              </div>
              <div>
                <h3 class="font-bold dark:text-white">হোয়াটসঅ্যাপ</h3>
                <p class="text-gray-500 text-sm">+৮৮০ ১৭৬৬ ২৯৮২১০</p>
              </div>
            </div>
          </div>

          <div
            class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-pink-100 dark:border-slate-700"
          >
            <div class="flex items-center gap-4">
              <div
                class="w-12 h-12 bg-blue-100 dark:bg-blue-900/30 rounded-2xl flex items-center justify-center"
              >
                <i class="fas fa-envelope text-blue-500"></i>
              </div>
              <div>
                <h3 class="font-bold dark:text-white">ইমেইল</h3>
                <p class="text-gray-500 text-sm">support@shebakhojo.com</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Unified Contact & Complaint Form -->
        <div class="lg:col-span-2">
          <form
            id="contactForm"
            class="bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] shadow-xl border border-pink-100 dark:border-slate-700 space-y-6"
          >
            <div class="grid md:grid-cols-2 gap-6">
              <div class="space-y-2">
                <label
                  class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider ml-1"
                  >আপনার নাম</label
                >
                <input
                  type="text"
                  id="name"
                  required
                  class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-700 border border-gray-200 dark:border-slate-600 rounded-xl focus:ring-2 focus:ring-pink-500 outline-none transition dark:text-white"
                />
              </div>
              <div class="space-y-2">
                <label
                  class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider ml-1"
                  >ইমেইল / ফোন</label
                >
                <input
                  type="text"
                  id="contact"
                  required
                  class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-700 border border-gray-200 dark:border-slate-600 rounded-xl focus:ring-2 focus:ring-pink-500 outline-none transition dark:text-white"
                />
              </div>
            </div>

            <div class="space-y-2">
              <label
                class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider ml-1"
                >বিষয় (Subject)</label
              >
              <select
                id="subject"
                class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-700 border border-gray-200 dark:border-slate-600 rounded-xl focus:ring-2 focus:ring-pink-500 outline-none transition dark:text-white cursor-pointer"
              >
                <option value="General">সাধারণ জিজ্ঞাসা</option>
                <option value="Feedback">মতামত (Feedback)</option>
                <option value="Complaint">অভিযোগ (Complaint)</option>
                <option value="Service">সার্ভিস সংক্রান্ত</option>
              </select>
            </div>

            <div class="space-y-2">
              <label
                class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider ml-1"
                >আপনার বার্তা</label
              >
              <textarea
                id="message"
                rows="4"
                required
                class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-700 border border-gray-200 dark:border-slate-600 rounded-xl focus:ring-2 focus:ring-pink-500 outline-none transition dark:text-white"
              ></textarea>
            </div>

            <button
              type="submit"
              class="w-full bg-pink-600 hover:bg-pink-700 text-white font-bold py-4 rounded-xl shadow-lg transition transform active:scale-95"
            >
              বার্তা পাঠান
            </button>
          </form>
        </div>
      </div>

      <!-- Google Map Section -->
      <div
        class="mt-12 bg-white dark:bg-slate-800 p-4 rounded-[2.5rem] shadow-xl border border-pink-100 dark:border-slate-700 overflow-hidden"
      >
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14602.254272231177!2d90.4126621!3d23.7915!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3755c7a0f70deb73%3A0x30c3642c3d39ef51!2sGulshan%2C%20Dhaka!5e0!3m2!1sen!2sbd!4v1715600000000!5m2!1sen!2sbd"
          class="w-full h-[400px] rounded-3xl"
          style="border: 0"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        ></iframe>
      </div>
    </main>

    <!-- WhatsApp Floating Live Chat Button -->
    <a
      href="https://wa.me/8801234567890"
      target="_blank"
      class="fixed bottom-8 right-8 bg-green-500 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-2xl hover:scale-110 transition-all z-[100] group"
    >
      <i class="fab fa-whatsapp text-2xl"></i>
      <span
        class="absolute right-16 bg-white dark:bg-slate-800 text-slate-800 dark:text-white px-4 py-2 rounded-xl text-xs font-bold shadow-lg opacity-0 group-hover:opacity-100 transition whitespace-nowrap border dark:border-slate-700"
        >Chat with us!</span
      >
    </a>

    <script src="./contact.js"></script>
  </body>
</html>
